<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Database Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">📁</span>
          <span class="logo-text">FileDB</span>
        </div>
        <button class="new-folder-btn" id="newFolderBtn">+</button>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Quick Access</div>
        <button class="sidebar-item active" data-folder="all" onclick="selectFolder('all')">
          <span class="item-icon">🏠</span>
          <span>All Files</span>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="section-title">Folders</div>
        <div id="folderList" class="folder-list"></div>
      </div>

      <div class="sidebar-section">
        <div class="section-title">API Server</div>
        <div class="api-status">
          <span class="status-dot"></span>
          <span>localhost:5000</span>
        </div>
        <button class="api-docs-btn" onclick="showApiDocs()">View API Docs</button>
      </div>
    </div>

    <div class="main-content">
      <div class="toolbar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search files..." oninput="searchFiles(this.value)">
        </div>
        <div class="toolbar-actions">
          <button class="action-btn" onclick="importFiles()">
            <span>📥</span> Import Files
          </button>
          <button class="action-btn" onclick="importFolder()">
            <span>📂</span> Import Folder
          </button>
        </div>
      </div>

      <div class="drop-zone" id="dropZone">
        <div class="drop-content">
          <span class="drop-icon">📁</span>
          <p>Drag & drop files here</p>
          <span class="drop-hint">or use buttons above</span>
        </div>
      </div>

      <div class="file-table-container">
        <table class="file-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Filename</th>
              <th>Type</th>
              <th>Size</th>
              <th>Tags</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody id="fileTableBody"></tbody>
        </table>
      </div>

      <div class="status-bar">
        <span id="statusText">Loading...</span>
      </div>
    </div>

    <div class="detail-panel" id="detailPanel" style="display:none">
      <div class="panel-header">
        <h3>Preview</h3>
        <button class="close-panel-btn" onclick="closePanel()">×</button>
      </div>

      <div class="preview-area" id="previewArea">
        <span class="preview-placeholder">Select a file</span>
      </div>

      <div class="info-section">
        <h4>File Info</h4>
        <div class="info-content" id="fileInfo"></div>
      </div>

      <div class="edit-section">
        <h4>Edit</h4>
        <div class="form-group">
          <label>Tags</label>
          <input type="text" id="tagsInput" placeholder="Comma separated">
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="notesInput" rows="3" placeholder="Add notes..."></textarea>
        </div>
        <div class="btn-group">
          <button class="save-btn" onclick="saveFile()">Save</button>
          <button class="delete-btn" onclick="deleteFile()">Delete</button>
          <button class="export-btn" onclick="exportFile()">Export</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="app.js"></script>
</body>
</html>
